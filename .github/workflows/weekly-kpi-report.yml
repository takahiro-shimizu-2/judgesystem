name: Weekly KPI Report

# Post weekly KPI report to GitHub Discussions every Monday at 9:00 AM UTC
on:
  schedule:
    - cron: '0 9 * * MON'  # Every Monday at 9:00 AM UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  generate-and-post-report:
    runs-on: ubuntu-latest
    name: Generate and post weekly KPI report
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Generate and Post KPI Report
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npx tsx scripts/post-kpi-report.ts

      - name: Summary
        run: |
          {
            echo "### 📊 Weekly KPI Report Posted"
            echo
            echo "✓ Successfully generated and posted weekly KPI report to Discussions"
            echo
            echo "View at: https://github.com/${{ github.repository }}/discussions"
          } >> "$GITHUB_STEP_SUMMARY"
