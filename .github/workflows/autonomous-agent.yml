name: Autonomous Agent Execution

on:
  issues:
    types: [opened, labeled, edited]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process'
        required: true
        type: number
      execution_mode:
        description: 'planning or execute'
        required: true
        default: planning
        type: choice
        options:
          - planning
          - execute

env:
  NODE_VERSION: '20'

jobs:
  # Job 1: Check if the planning workflow should execute
  check-trigger:
    name: Check Agent Trigger
    runs-on: ubuntu-latest
    outputs:
      should_execute: ${{ steps.check.outputs.should_execute }}
      issue_number: ${{ steps.check.outputs.issue_number }}
      execution_mode: ${{ steps.check.outputs.execution_mode }}
    steps:
      - name: Check trigger conditions
        id: check
        run: |
          SHOULD_EXECUTE="false"
          ISSUE_NUMBER=""
          EXECUTION_MODE="planning"

          # Check if manually triggered
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHOULD_EXECUTE="true"
            ISSUE_NUMBER="${{ github.event.inputs.issue_number }}"
            EXECUTION_MODE="${{ github.event.inputs.execution_mode }}"
            echo "Manual trigger for issue #${ISSUE_NUMBER}"
          fi

          # Check if issue has agent-execute label
          if [ "${{ github.event_name }}" = "issues" ]; then
            LABELS='${{ toJson(github.event.issue.labels.*.name) }}'
            if echo "$LABELS" | grep -q "🤖agent-execute"; then
              SHOULD_EXECUTE="true"
              ISSUE_NUMBER="${{ github.event.issue.number }}"
              echo "Issue #${ISSUE_NUMBER} has agent-execute label"
            fi
          fi

          # Check if comment contains /agent command or @miyabi mention
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            COMMENT="${{ github.event.comment.body }}"
            if echo "$COMMENT" | grep -Eq "^/agent|@miyabi"; then
              SHOULD_EXECUTE="true"
              ISSUE_NUMBER="${{ github.event.issue.number }}"
              echo "Comment triggered agent execution for issue #${ISSUE_NUMBER}"
            fi
          fi

          echo "should_execute=${SHOULD_EXECUTE}" >> $GITHUB_OUTPUT
          echo "issue_number=${ISSUE_NUMBER}" >> $GITHUB_OUTPUT
          echo "execution_mode=${EXECUTION_MODE}" >> $GITHUB_OUTPUT

  # Job 2: Build an execution plan and publish artifacts
  execute-agents:
    name: Plan Autonomous Agent Execution
    runs-on: ubuntu-latest
    needs: check-trigger
    if: needs.check-trigger.outputs.should_execute == 'true'

    permissions:
      issues: write
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript compilation check
        run: npm run typecheck

      - name: Create agent configuration
        run: |
          cat > .env << EOF
          GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          DEVICE_IDENTIFIER="GitHub Actions Runner"
          ISSUE_NUMBER=${{ needs.check-trigger.outputs.issue_number }}
          REPOSITORY=${{ github.repository }}
          EOF

      - name: Execute planning runtime
        id: execute
        run: |
          MODE="${{ needs.check-trigger.outputs.execution_mode }}"
          echo "🚀 Starting ${MODE} runtime for Issue #${{ needs.check-trigger.outputs.issue_number }}"

          ARGS=(
            --issue "${{ needs.check-trigger.outputs.issue_number }}"
            --concurrency 3
            --log-level info
          )

          if [ "$MODE" != "execute" ]; then
            ARGS+=(--dry-run)
          fi

          npm run agents:parallel:exec -- "${ARGS[@]}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AUTOMATION_ENABLE_PR_WRITE: ${{ vars.AUTOMATION_ENABLE_PR_WRITE }}
        continue-on-error: true

      - name: Summarize execution artifacts
        id: summarize
        if: always()
        run: |
          npx tsx scripts/autonomous-agent-summary.ts \
            --issue "${{ needs.check-trigger.outputs.issue_number }}" \
            --root "$GITHUB_WORKSPACE" \
            --status "${{ steps.execute.outcome == 'success' && 'success' || 'failure' }}" \
            --triggered-by "${{ github.actor }}" \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --out-md "$RUNNER_TEMP/autonomous-agent-comment.md" \
            --out-json "$RUNNER_TEMP/autonomous-agent-summary.json"

          echo "comment_path=$RUNNER_TEMP/autonomous-agent-comment.md" >> $GITHUB_OUTPUT
          echo "summary_json_path=$RUNNER_TEMP/autonomous-agent-summary.json" >> $GITHUB_OUTPUT

          node <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require('fs');
          const summary = JSON.parse(fs.readFileSync(process.env.SUMMARY_JSON_PATH, 'utf8'));
          console.log(`status=${summary.status}`);
          console.log(`execution_mode=${summary.executionMode}`);
          console.log(`failed_tasks=${summary.totals.failed}`);
          NODE
        env:
          SUMMARY_JSON_PATH: ${{ runner.temp }}/autonomous-agent-summary.json

      - name: Upload execution logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-execution-logs-${{ needs.check-trigger.outputs.issue_number }}
          path: |
            .ai/logs/
            .ai/parallel-reports/
          retention-days: 30

      - name: Publish workflow summary
        if: always()
        run: cat "${{ steps.summarize.outputs.comment_path }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on Issue
        if: always()
        uses: actions/github-script@v7
        env:
          COMMENT_PATH: ${{ steps.summarize.outputs.comment_path }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const body = fs.readFileSync(process.env.COMMENT_PATH, 'utf8');
            github.rest.issues.createComment({
              issue_number: ${{ needs.check-trigger.outputs.issue_number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            })

      - name: Add escalation label on failure
        if: steps.summarize.outputs.status == 'failure'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.addLabels({
              issue_number: ${{ needs.check-trigger.outputs.issue_number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['🚨escalated', '❌agent-failed']
            })
