name: Autonomous Agent Execution

on:
  issues:
    types: [opened, labeled, edited]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process'
        required: true
        type: number

env:
  NODE_VERSION: '20'

jobs:
  # Job 1: Check if the planning workflow should execute
  check-trigger:
    name: Check Agent Trigger
    runs-on: ubuntu-latest
    outputs:
      should_execute: ${{ steps.check.outputs.should_execute }}
      issue_number: ${{ steps.check.outputs.issue_number }}
    steps:
      - name: Check trigger conditions
        id: check
        run: |
          SHOULD_EXECUTE="false"
          ISSUE_NUMBER=""

          # Check if manually triggered
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHOULD_EXECUTE="true"
            ISSUE_NUMBER="${{ github.event.inputs.issue_number }}"
            echo "Manual trigger for issue #${ISSUE_NUMBER}"
          fi

          # Check if issue has agent-execute label
          if [ "${{ github.event_name }}" = "issues" ]; then
            LABELS='${{ toJson(github.event.issue.labels.*.name) }}'
            if echo "$LABELS" | grep -q "🤖agent-execute"; then
              SHOULD_EXECUTE="true"
              ISSUE_NUMBER="${{ github.event.issue.number }}"
              echo "Issue #${ISSUE_NUMBER} has agent-execute label"
            fi
          fi

          # Check if comment contains /agent command or @miyabi mention
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            COMMENT="${{ github.event.comment.body }}"
            if echo "$COMMENT" | grep -Eq "^/agent|@miyabi"; then
              SHOULD_EXECUTE="true"
              ISSUE_NUMBER="${{ github.event.issue.number }}"
              echo "Comment triggered agent execution for issue #${ISSUE_NUMBER}"
            fi
          fi

          echo "should_execute=${SHOULD_EXECUTE}" >> $GITHUB_OUTPUT
          echo "issue_number=${ISSUE_NUMBER}" >> $GITHUB_OUTPUT

  # Job 2: Build an execution plan and publish artifacts
  execute-agents:
    name: Plan Autonomous Agent Execution
    runs-on: ubuntu-latest
    needs: check-trigger
    if: needs.check-trigger.outputs.should_execute == 'true'

    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript compilation check
        run: npm run typecheck

      - name: Create agent configuration
        run: |
          cat > .env << EOF
          GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          DEVICE_IDENTIFIER="GitHub Actions Runner"
          ISSUE_NUMBER=${{ needs.check-trigger.outputs.issue_number }}
          REPOSITORY=${{ github.repository }}
          EOF

      - name: Execute planning runtime
        id: execute
        run: |
          echo "🚀 Starting planning runtime for Issue #${{ needs.check-trigger.outputs.issue_number }}"

          npm run agents:parallel:exec -- \
            --issue ${{ needs.check-trigger.outputs.issue_number }} \
            --concurrency 3 \
            --dry-run \
            --log-level info
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        continue-on-error: true

      - name: Record execution outcome
        id: outcome
        if: always()
        run: |
          if [ "${{ steps.execute.outcome }}" = "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "summary=Planning artifacts generated successfully" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "summary=Planning runtime failed" >> $GITHUB_OUTPUT
          fi

      - name: Upload execution logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-execution-logs-${{ needs.check-trigger.outputs.issue_number }}
          path: |
            .ai/logs/
            .ai/parallel-reports/
          retention-days: 30

      - name: Comment on Issue (Planning Complete)
        if: steps.outcome.outputs.status == 'success'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: ${{ needs.check-trigger.outputs.issue_number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ✅ Autonomous Planning Complete

            **Status**: Planning artifacts generated
            **Run ID**: ${{ github.run_id }}
            **Triggered by**: ${{ github.actor }}

            ### What ran

            - ✅ Issue context was fetched
            - ✅ Task decomposition and DAG planning ran
            - ✅ Execution plan and report artifacts were generated
            - ℹ️ No pull request was created because this workflow currently runs in planning mode

            ### Next Steps

            1. Download the workflow artifacts for the generated plan and report
            2. Review the planned tasks, warnings, and worktree assignments
            3. Implement or connect the required runtime handlers before enabling auto-PR behavior

            [View Run Logs →](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ---

            🤖 Executed by the judgesystem planning runtime`
            })

      - name: Comment on Issue (Failure)
        if: steps.outcome.outputs.status == 'failure'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: ${{ needs.check-trigger.outputs.issue_number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ❌ Autonomous Agent Execution Failed

            **Status**: Failed
            **Run ID**: ${{ github.run_id }}

            ### Error

            The agent execution encountered an error. Please check the logs for details.

            ### Escalation

            This issue has been escalated to @${{ github.repository_owner }} for review.

            [View Logs →](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ---

            🤖 Autonomous planning runtime`
            })

      - name: Add escalation label on failure
        if: steps.outcome.outputs.status == 'failure'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.addLabels({
              issue_number: ${{ needs.check-trigger.outputs.issue_number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['🚨escalated', '❌agent-failed']
            })
