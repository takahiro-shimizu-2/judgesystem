services:
  db:
    image: postgres:16-alpine
    ports:
      - "${DB_PORT:-5434}:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-migrate:
    image: ghcr.io/amacneil/dbmate:2
    command: ["up", "--wait", "--no-dump-schema"]
    environment:
      DATABASE_URL: "postgres://postgres:postgres@db:5432/postgres?sslmode=disable"
    volumes:
      - ../db/migrations:/db/migrations:ro
    depends_on:
      db:
        condition: service_healthy

  db-seed:
    image: postgres:16-alpine
    entrypoint: sh
    command: /seeds/seed.sh
    environment:
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: postgres
      PGUSER: postgres
      PGPASSWORD: postgres
    volumes:
      - ../db/seeds:/seeds:ro
      - ../data/master:/master-data:ro
    depends_on:
      db-migrate:
        condition: service_completed_successfully

  install:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install --prefer-offline && echo ready > /app/.node_modules_ready"
    volumes:
      - ..:/app
      - node_modules:/app/node_modules

  backend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "until [ -f /app/.node_modules_ready ]; do sleep 1; done && npx tsx watch --tsconfig packages/backend/tsconfig.json packages/backend/index.ts"
    ports:
      - "${BACKEND_PORT:-3080}:3080"
    volumes:
      - ..:/app
      - node_modules:/app/node_modules
    environment:
      PORT: 3080
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: postgres
      PGUSER: postgres
      PGPASSWORD: postgres
      PGSSLMODE: disable
      AUTH_ENABLED: "false"
      CORS_ORIGIN: http://localhost:${FRONTEND_PORT:-3173}
    depends_on:
      db-seed:
        condition: service_completed_successfully
      install:
        condition: service_completed_successfully

  frontend:
    image: node:22-alpine
    working_dir: /app/packages/frontend
    command: sh -c "npx vite --host 0.0.0.0 --port 3173"
    ports:
      - "${FRONTEND_PORT:-3173}:3173"
    volumes:
      - ..:/app
      - node_modules:/app/node_modules
    environment:
      VITE_API_URL: http://localhost:${BACKEND_PORT:-3080}
    depends_on:
      install:
        condition: service_completed_successfully
      backend:
        condition: service_started

  fetch-partners:
    build:
      context: ..
      dockerfile: db/scripts/Dockerfile
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS:-./.gcp-key.json}:/app/credentials.json:ro
      - ../data/master:/app/output
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /app/credentials.json
    command: ["--output-dir", "/app/output"]
    profiles:
      - tools

  engine:
    build:
      context: ..
      dockerfile: packages/engine/Dockerfile
    volumes:
      - ../data:/app/data
    environment:
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: postgres
      PGUSER: postgres
      PGPASSWORD: postgres
      PGSSLMODE: disable
    depends_on:
      db-seed:
        condition: service_completed_successfully
    profiles:
      - engine

volumes:
  pgdata:
  node_modules:
